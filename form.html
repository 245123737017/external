<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenkins Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin-top: 80px;
        }

        .container {
            background: white;
            padding: 30px;
            width: 350px;
            margin: auto;
            border-radius: 8px;
            box-shadow: 0 0 10px #ccc;
        }

        h1 {
            color: #0078d7;
        }

        button {
            padding: 10px 20px;
            background: #0078d7;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #005fa3;
        }

        #message {
            margin-top: 20px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Jenkins Demo</h1>
    <p>This page is deployed using Jenkins.</p>

    <button onclick="showMessage()">Click Me</button>

    <p id="message"></p>
</div>

<script>
function showMessage() {
    document.getElementById("message").innerHTML =
        "Hello! Jenkins deployment is working.";
}
</script>

</body>
</html>
