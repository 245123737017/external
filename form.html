<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form id="loginForm" action="/submit" method="post" novalidate>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
        <br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <br><br>
        <input type="submit" value="Submit">
        <p id="message" aria-live="polite" style="font-weight:600;"></p>
    </form>

    <script>
        (function(){
            const VALID_USERNAME = '245123737017';
            const VALID_PASSWORD = '245123737017';

            const form = document.getElementById('loginForm');
            const msg = document.getElementById('message');

            form.addEventListener('submit', function(e){
                e.preventDefault();
                const u = document.getElementById('username').value.trim();
                const p = document.getElementById('password').value;

                if(u === VALID_USERNAME && p === VALID_PASSWORD){
                    msg.textContent = 'Credentials valid.';
                    msg.style.color = 'green';
                } else {
                    msg.textContent = 'Invalid username or password.';
                    msg.style.color = 'red';
                }
            });
        })();
    </script>
</body>
</html>
